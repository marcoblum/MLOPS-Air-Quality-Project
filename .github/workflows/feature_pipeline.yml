name: Hourly Feature Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline and Train Model
        env:
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: |
          python src/feature_pipeline/run_feature_pipeline.py
          python src/training_pipeline/train_model.py

      - name: Commit and Push Model
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Nur noch das trainierte Modell sichern, da die Daten in Hopsworks liegen
          git add -f models/*.pkl
          git commit -m "auto: update trained model" || echo "No changes to commit"
          git push